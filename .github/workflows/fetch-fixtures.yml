name: fetch-fixtures

# 実APIから生レスポンスを採取して artifacts に保存するだけの手動ワークフロー。
#
# 背景: 開発サンドボックスからは egress ポリシーで実API(api.themeparks.wiki /
# queue-times.com)に出られない。そこで GitHub Actions のランナーから一度だけ叩き、
# 取れた実JSONをダウンロードして tests/fixtures/ と正規化を「実物」に合わせて更新する。
#
# 礼儀(CLAUDE.md データ倫理):User-Agent 明示、低頻度(手動のみ)、私的利用の範囲。
# Queue-Times のデータを画面表示に使う場合は "Powered by Queue-Times.com" 表記+リンク必須
# (このワークフローは採取のみで表示はしない)。
#
# 注意: workflow_dispatch の「Run workflow」ボタンは、ワークフローファイルが
# デフォルトブランチ(main)に存在して初めて Actions UI に現れる。フィーチャーブランチ
# のままだと出ないことがあるので、その場合は先に main へ取り込むこと。

on:
  workflow_dispatch:

# 採取した実JSONを captured-fixtures ブランチへ push するため書き込み権限が要る。
# (開発サンドボックスは artifacts の Azure ダウンロードURLに egress で出られないため、
#  git 経由で受け渡す。git リモートはプロキシ経由で到達できる。)
permissions:
  contents: write

jobs:
  fetch:
    runs-on: ubuntu-latest
    env:
      # config.py の USER_AGENT と揃える。
      UA: "sabotage-poller/0.1 (+https://github.com/345sugar/shoyoyu; personal-use)"
      TDL_ID: "3cc919f1-d16d-43e0-8c3f-1dd269bd1a42"
      TDS_ID: "67b290d5-3478-4f23-b601-2f8fb71ba803"
      # ショー /live の形状確認用サンプル(children から採取した実 SHOW ID)。
      SHOW_TDL_PARADE: "764d8c54-70be-413c-9a9d-f6d69336684b"   # Electrical Parade Dreamlights
      SHOW_TDL_STAGE: "80ce7be5-50d1-4deb-b26d-abc44a0383fb"    # Mickey's Magical Music World
      SHOW_TDS: "af936032-09bb-4b4f-996d-bedf400056b0"          # Believe! Sea of Dreams
      OUT: captured
    steps:
      - name: Checkout (for pushing captured JSON to a branch)
        uses: actions/checkout@v5

      - name: Prepare output dir
        run: mkdir -p "$OUT"

      # curl は失敗しても body を残し、ジョブは止めない(部分採取でも artifacts にしたい)。
      # HTTP ステータスは status_*.txt に記録して欠測かどうか後から分かるようにする。
      - name: Fetch ThemeParks.wiki /destinations
        continue-on-error: true
        run: |
          code=$(curl -sS --retry 3 --retry-delay 3 -A "$UA" \
            -H 'Accept: application/json' \
            -w '%{http_code}' \
            -o "$OUT/themeparks_destinations.json" \
            "https://api.themeparks.wiki/v1/destinations") || code="000"
          echo "$code" > "$OUT/status_themeparks_destinations.txt"
          echo "HTTP $code (destinations)"
          head -c 400 "$OUT/themeparks_destinations.json" || true; echo

      - name: Be polite (jitter)
        run: sleep 5

      - name: Fetch ThemeParks.wiki Tokyo Disneyland /live
        continue-on-error: true
        run: |
          code=$(curl -sS --retry 3 --retry-delay 3 -A "$UA" \
            -H 'Accept: application/json' \
            -w '%{http_code}' \
            -o "$OUT/themeparks_tdl_live.json" \
            "https://api.themeparks.wiki/v1/entity/$TDL_ID/live") || code="000"
          echo "$code" > "$OUT/status_themeparks_tdl_live.txt"
          echo "HTTP $code (TDL live)"
          head -c 400 "$OUT/themeparks_tdl_live.json" || true; echo

      - name: Be polite (jitter)
        run: sleep 5

      - name: Fetch ThemeParks.wiki Tokyo DisneySea /live
        continue-on-error: true
        run: |
          code=$(curl -sS --retry 3 --retry-delay 3 -A "$UA" \
            -H 'Accept: application/json' \
            -w '%{http_code}' \
            -o "$OUT/themeparks_tds_live.json" \
            "https://api.themeparks.wiki/v1/entity/$TDS_ID/live") || code="000"
          echo "$code" > "$OUT/status_themeparks_tds_live.txt"
          echo "HTTP $code (TDS live)"
          head -c 400 "$OUT/themeparks_tds_live.json" || true; echo

      - name: Be polite (jitter)
        run: sleep 5

      # Queue-Times は突合・冗長化用(roadmap のサブ)。ここでは parks.json のみ採取。
      - name: Fetch Queue-Times parks.json
        continue-on-error: true
        run: |
          code=$(curl -sS --retry 3 --retry-delay 3 -A "$UA" \
            -H 'Accept: application/json' \
            -w '%{http_code}' \
            -o "$OUT/queue_times_parks.json" \
            "https://queue-times.com/parks.json") || code="000"
          echo "$code" > "$OUT/status_queue_times_parks.txt"
          echo "HTTP $code (queue-times parks)"
          head -c 400 "$OUT/queue_times_parks.json" || true; echo

      - name: Be polite (jitter)
        run: sleep 5

      # /children:パーク配下の全エンティティ(アトラクション/レストラン/ショー等)の一覧。
      # /live はアトラクションしか返さないため、レストランが存在するかはここで確認する。
      - name: Fetch ThemeParks.wiki Tokyo Disneyland /children
        continue-on-error: true
        run: |
          code=$(curl -sS --retry 3 --retry-delay 3 -A "$UA" \
            -H 'Accept: application/json' \
            -w '%{http_code}' \
            -o "$OUT/themeparks_tdl_children.json" \
            "https://api.themeparks.wiki/v1/entity/$TDL_ID/children") || code="000"
          echo "$code" > "$OUT/status_themeparks_tdl_children.txt"
          echo "HTTP $code (TDL children)"
          # entityType の内訳をログに出す(RESTAURANT が居るかを一目で確認)。
          python3 -c "import json,collections; d=json.load(open('$OUT/themeparks_tdl_children.json')); print(collections.Counter(c.get('entityType') for c in d.get('children',[])))" || true

      - name: Be polite (jitter)
        run: sleep 5

      - name: Fetch ThemeParks.wiki Tokyo DisneySea /children
        continue-on-error: true
        run: |
          code=$(curl -sS --retry 3 --retry-delay 3 -A "$UA" \
            -H 'Accept: application/json' \
            -w '%{http_code}' \
            -o "$OUT/themeparks_tds_children.json" \
            "https://api.themeparks.wiki/v1/entity/$TDS_ID/children") || code="000"
          echo "$code" > "$OUT/status_themeparks_tds_children.txt"
          echo "HTTP $code (TDS children)"
          python3 -c "import json,collections; d=json.load(open('$OUT/themeparks_tds_children.json')); print(collections.Counter(c.get('entityType') for c in d.get('children',[])))" || true

      - name: Be polite (jitter)
        run: sleep 5

      # ショー個別の /live。パークの /live はショーを含まないため、ショー時刻(showtimes)が
      # 取れるかは各ショーの /live を叩いて確認する。3つサンプル採取。
      - name: Fetch show /live samples
        continue-on-error: true
        run: |
          for pair in "tdl_parade:$SHOW_TDL_PARADE" "tdl_stage:$SHOW_TDL_STAGE" "tds:$SHOW_TDS"; do
            key="${pair%%:*}"; id="${pair##*:}"
            code=$(curl -sS --retry 3 --retry-delay 3 -A "$UA" \
              -H 'Accept: application/json' \
              -w '%{http_code}' \
              -o "$OUT/themeparks_show_${key}_live.json" \
              "https://api.themeparks.wiki/v1/entity/$id/live") || code="000"
            echo "$code" > "$OUT/status_themeparks_show_${key}_live.txt"
            echo "HTTP $code (show $key)"
            head -c 600 "$OUT/themeparks_show_${key}_live.json" || true; echo
            sleep 5
          done

      - name: Be polite (jitter)
        run: sleep 5

      # Open-Meteo(天気・キー不要)。舞浜の現在天気+当日の時間別予報。
      # data/weather.py の WeatherClient と同じクエリ形状で採取する。
      - name: Fetch Open-Meteo forecast (Maihama)
        continue-on-error: true
        run: |
          code=$(curl -sS --retry 3 --retry-delay 3 -A "$UA" \
            -H 'Accept: application/json' \
            -w '%{http_code}' \
            -o "$OUT/open_meteo_forecast.json" \
            "https://api.open-meteo.com/v1/forecast?latitude=35.63&longitude=139.88&current=temperature_2m,precipitation,weather_code&hourly=precipitation_probability,precipitation,temperature_2m&forecast_days=1&timezone=Asia%2FTokyo") || code="000"
          echo "$code" > "$OUT/status_open_meteo_forecast.txt"
          echo "HTTP $code (open-meteo)"
          head -c 400 "$OUT/open_meteo_forecast.json" || true; echo

      - name: Summary
        run: |
          echo "== captured files =="
          ls -la "$OUT" || true
          echo "== byte sizes =="
          wc -c "$OUT"/*.json || true
          echo "== HTTP statuses =="
          for f in "$OUT"/status_*.txt; do echo "$(cat "$f")  $f"; done || true

      - name: Upload captured fixtures
        uses: actions/upload-artifact@v5
        with:
          name: sabotage-captured-fixtures-${{ github.run_id }}
          path: ${{ env.OUT }}/
          retention-days: 14
          if-no-files-found: warn

      # 採取物を専用ブランチへ force-push する。artifacts の Azure ダウンロードURLに
      # 出られない環境でも、git 経由なら実JSONを受け取れる。captured-fixtures は
      # 使い捨ての受け渡し用ブランチ(毎回上書き)。
      - name: Publish captured JSON to captured-fixtures branch
        if: always()
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          mkdir -p captured_out
          cp "$OUT"/*.json "$OUT"/*.txt captured_out/ 2>/dev/null || true
          git add -f captured_out
          git commit -m "captured real API fixtures (run ${{ github.run_id }})" \
            || { echo "nothing captured to commit"; exit 0; }
          git push -f origin "HEAD:refs/heads/captured-fixtures"
          echo "pushed captured JSON to branch: captured-fixtures"
